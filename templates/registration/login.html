<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Writing Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; }
        .login-card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 1rem; }
        .brand { font-size: 1.5rem; font-weight: 700; color: #6366f1; letter-spacing: -.02em; }
        .form-control { background: #0f1117; border-color: #2d3148; color: #e2e8f0; }
        .form-control:focus { background: #0f1117; border-color: #6366f1; color: #e2e8f0; box-shadow: 0 0 0 .2rem rgba(99,102,241,.25); }
        .btn-primary { background: #6366f1; border-color: #6366f1; }
        .btn-primary:hover { background: #4f46e5; border-color: #4f46e5; }
        .text-muted { color: #64748b !important; }
        label { color: #94a3b8; font-size: .875rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-sm-10 col-md-6 col-lg-4">
            <div class="login-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="brand"><i class="bi bi-pen me-2"></i>Writing Hub</div>
                    <p class="text-muted small mt-1">Autorenplattform</p>
                </div>

                <div class="d-grid mb-3">
                    <a href="/oidc/authenticate/" class="btn btn-lg" style="background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border: none; color: white;">
                        <i class="bi bi-shield-lock me-2"></i>Mit IIL Platform SSO anmelden
                    </a>
                </div>
                <div class="text-center text-muted small my-3">oder mit Passwort</div>

                {% if form.errors %}
                <div class="alert alert-danger py-2 small">
                    <i class="bi bi-exclamation-triangle me-1"></i>
                    Ungültiger Benutzername oder Passwort.
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">Benutzername</label>
                        <input type="text" name="username" id="id_username"
                            class="form-control" placeholder="username" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label for="id_password" class="form-label">Passwort</label>
                        <input type="password" name="password" id="id_password"
                            class="form-control" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Anmelden
                    </button>
                </form>

                <p class="text-center text-muted small mt-4 mb-0">
                    <a href="/admin/" class="text-secondary">Admin-Bereich</a>
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Django==5.2.6 djangorestframework==3.16.1 django-filter==24.3 django-crispy-forms==2.3 crispy-bootstrap5==2024.10 whitenoise==6.11.0 pydantic==2.12.0 Pillow==12.0.0
      
      - name: Run migrations check
        run: |
          python manage.py migrate --settings=config.settings.test --run-syncdb
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
      
      - name: Run tests
        run: |
          python manage.py test --settings=config.settings.test
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test

# ============================================================
# Situationstypen — Genre 7: Lyrik / Kreativ
# ============================================================
- model: authors.situationtype
  pk: 701
  fields:
    genre_profile: 7
    slug: opening-image
    label: Eroeffnungsbild
    description: "Konkretes Bild, kein abstraktes Konzept"
    llm_prompt_hint: >
      Analysiere: Konkretheit des Bildes, sinnliche Praesenz.
      Beachte: Kein abstraktes Konzept, sondern: Was sieht/hoert/riecht man?
    sort_order: 10
    is_active: true

- model: authors.situationtype
  pk: 702
  fields:
    genre_profile: 7
    slug: turn
    label: "Volta / Wendung"
    description: "Moment des Umschlags"
    llm_prompt_hint: >
      Analysiere: Wendepunkt, Umschlag im Ton/Bild/Perspektive.
      Beachte: Volta kann subtil oder hart sein, aber sie muss spuerbar sein.
    sort_order: 20
    is_active: true

- model: authors.situationtype
  pk: 703
  fields:
    genre_profile: 7
    slug: sensory-detail
    label: Sensorisches Detail
    description: "Nicht 'schoen' — sondern was genau"
    llm_prompt_hint: >
      Analysiere: Konkrete Sinneswahrnehmung statt Bewertung.
      Beachte: Nicht 'schoen', sondern was genau gesehen/gehoert/gerochen wird.
    sort_order: 30
    is_active: true

- model: authors.situationtype
  pk: 704
  fields:
    genre_profile: 7
    slug: white-space
    label: "Zeilenbruch / Weissraum"
    description: "Was das Schweigen sagt"
    llm_prompt_hint: >
      Analysiere: Bedeutung des Zeilenbruchs, Weissraum als Stilmittel.
      Beachte: Wo gebrochen wird, aendert Bedeutung. Pause ist Aussage.
    sort_order: 40
    is_active: true

- model: authors.situationtype
  pk: 705
  fields:
    genre_profile: 7
    slug: refrain
    label: "Refrain / Wiederholung"
    description: "Bedeutungsverschiebung durch Wiederholung"
    llm_prompt_hint: >
      Analysiere: Wiederholung mit Variation, Bedeutungsverschiebung.
      Beachte: Refrain darf nicht mechanisch wirken, jede Wiederholung verschiebt.
    sort_order: 50
    is_active: true

- model: authors.situationtype
  pk: 706
  fields:
    genre_profile: 7
    slug: metaphor-development
    label: Metaphern-Entfaltung
    description: "Ein Bild in drei Schichten"
    llm_prompt_hint: >
      Analysiere: Metapher ueber mehrere Zeilen/Strophen entwickelt, Schichtung.
      Beachte: Nicht Metaphern-Friedhof, sondern ein Bild, drei Ebenen.
    sort_order: 60
    is_active: true

- model: authors.situationtype
  pk: 707
  fields:
    genre_profile: 7
    slug: prose-poem
    label: Prosagedicht-Passage
    description: "Lyrik ohne Versform, Rhythmus im Satz"
    llm_prompt_hint: >
      Analysiere: Rhythmus im Prosasatz, lyrische Verdichtung ohne Vers.
      Beachte: Prosagedicht ist keine Prosa mit Zeilenumbruechen.
    sort_order: 70
    is_active: true

- model: authors.situationtype
  pk: 708
  fields:
    genre_profile: 7
    slug: closing-image
    label: "Schluss-Bild / Resonanz"
    description: "Offen enden, nachklingen lassen"
    llm_prompt_hint: >
      Analysiere: Schlussbild-Qualitaet, Resonanz, Offenheit.
      Beachte: Schluss erklaert nicht, er klingt nach.
    sort_order: 80
    is_active: true

    is_active: true

- model: authors.situationtype
  pk: 403
  fields:
    genre_profile: 4
    slug: quote-integration
    label: Zitatintegration
    description: "Zitat traegt, Einleitung kontextualisiert"
    llm_prompt_hint: >
      Analysiere: Zitat als Beleg, nicht als Dekoration. Einleitung gibt Kontext.

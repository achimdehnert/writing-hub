# ============================================================
# Situationstypen — Genre 1: Belletristik / Thriller
# ============================================================
- model: authors.situationtype
  pk: 101
  fields:
    genre_profile: 1
    slug: action
    label: Actionszene
    description: "Physische Konfrontation, Verfolgung, Kampf"
    llm_prompt_hint: >
      Analysiere: Satzrhythmus unter Druck, Koerperlichkeit statt Reflexion,
      Tempo durch Ellipsen. Beachte: keine inneren Monologe, kein Adjektivueberschuss.
    sort_order: 10
    is_active: true

- model: authors.situationtype
  pk: 102
  fields:
    genre_profile: 1
    slug: dialogue
    label: Dialog
    description: "Gespraeche mit Subtext und Machtgefaelle"
    llm_prompt_hint: >
      Analysiere: Subtext, Machtgefaelle, Nicht-Gesagtes.
      Beachte: Jede Figur hat eigene Sprechweise, kein Erklaer-Dialog.
    sort_order: 20
    is_active: true

- model: authors.situationtype
  pk: 103
  fields:
    genre_profile: 1
    slug: setting
    label: Ortsbeschreibung
    description: "Atmosphaere und Bedrohung durch Setting"
    llm_prompt_hint: >
      Analysiere: Sinneswahrnehmungen, Bedrohung durch Normalitaet,
      Setting als Spiegelbild der Figurenstimmung. Kein Postkartenblick.
    sort_order: 30
    is_active: true

- model: authors.situationtype
  pk: 104
  fields:
    genre_profile: 1
    slug: emotional
    label: Emotionale Szene
    description: "Verdiente Emotion ohne Sentimentalitaet"
    llm_prompt_hint: >
      Analysiere: Verdiente Emotion vs. Sentimentalitaet, koerperliche Manifestation
      statt Benennung. Beachte: Show don't tell.
    sort_order: 40
    is_active: true

- model: authors.situationtype
  pk: 105
  fields:
    genre_profile: 1
    slug: chapter-open
    label: Kapiteleinstieg
    description: "Sog erzeugen, Orientierung ohne Erklaerung"
    llm_prompt_hint: >
      Analysiere: Sog, Orientierung ohne Erklaerung, erster Satz als Versprechen.
      Beachte: kein Aufwaermen, sofort in Medias Res.
    sort_order: 50
    is_active: true

- model: authors.situationtype
  pk: 106
  fields:
    genre_profile: 1
    slug: chapter-close
    label: "Kapitelende / Cliffhanger"
    description: "Psychologische Wendung, Kurzsatz-Technik"
    llm_prompt_hint: >
      Analysiere: Psychologische Wendung, Kurzsatz am Ende, ungeloezte Frage.
      Beachte: Cliffhanger ist psychologisch, nicht nur Plot-Twist.
    sort_order: 60
    is_active: true

- model: authors.situationtype
  pk: 107
  fields:
    genre_profile: 1
    slug: inner-monologue
    label: Innerer Monolog
    description: "Figurenbewusstsein statt Erzaehlerkommentar"
    llm_prompt_hint: >
      Analysiere: Figurenbewusstsein vs. Erzaehlerkommentar, Gedankenrhythmus,
      Fragmentierung bei Stress. Beachte: Nicht-lineare Assoziationen.
    sort_order: 70
    is_active: true

- model: authors.situationtype
  pk: 108
  fields:
    genre_profile: 1
    slug: exposition
    label: Exposition
    description: "Figur ueber Verhalten zeigen, nicht erklaeren"
    llm_prompt_hint: >
      Analysiere: Figur ueber Verhalten/Dialog zeigen statt erklaeren,
      Backstory in Handlung einweben. Beachte: kein Info-Dump.
    sort_order: 80
    is_active: true


# ============================================================
# Situationstypen — Genre 2: Belletristik / Literatur
# ============================================================
- model: authors.situationtype
  pk: 201
  fields:
    genre_profile: 2
    slug: incipit
    label: "Erster Satz / Incipit"
    description: "Ton setzt, Welt eroeffnet, kein Plot-Einstieg"
    llm_prompt_hint: >
      Analysiere: Wie der erste Satz den Gesamtton setzt, Welt eroeffnet ohne Plot.
      Beachte: Sprachmelodie, Bildkraft, Versprechen an den Leser.
    sort_order: 10
    is_active: true

- model: authors.situationtype
  pk: 202
  fields:
    genre_profile: 2
    slug: dialogue
    label: Dialog
    description: "Literarische Qualitaet, Rhythmus, Schweigen"
    llm_prompt_hint: >
      Analysiere: Literarische Qualitaet des Dialogs, Rhythmus, bedeutungsvolles Schweigen.
      Beachte: Dialog als Charakterisierung, nicht als Information.
    sort_order: 20
    is_active: true

- model: authors.situationtype
  pk: 203
  fields:
    genre_profile: 2
    slug: landscape
    label: "Landschaft / Raum"
    description: "Stimmung ueber Natur, kein Postkartenblick"
    llm_prompt_hint: >
      Analysiere: Landschaft als Stimmungstraeger, Natur als Spiegel innerer Zustaende.
      Beachte: Sinnlichkeit, keine Reisefuehrer-Beschreibung.
    sort_order: 30
    is_active: true

- model: authors.situationtype
  pk: 204
  fields:
    genre_profile: 2
    slug: memory
    label: "Erinnerung / Rueckblende"
    description: "Zeit als Schicht, nicht als Sprung"
    llm_prompt_hint: >
      Analysiere: Zeit als Schicht statt als Sprung, Erinnerung als Gegenwart.
      Beachte: Uebergangstechnik, Vermeidung von Erklaerungen.
    sort_order: 40
    is_active: true

- model: authors.situationtype
  pk: 205
  fields:
    genre_profile: 2
    slug: chapter-open
    label: Kapiteleinstieg
    description: "Ton neu kalibrieren, nicht Handlung vorantreiben"
    llm_prompt_hint: >
      Analysiere: Ton-Kalibrierung, Rhythmuswechsel zum vorigen Kapitel.
      Beachte: Handlung folgt dem Ton, nicht umgekehrt.
    sort_order: 50
    is_active: true

- model: authors.situationtype
  pk: 206
  fields:
    genre_profile: 2
    slug: reflection
    label: "Reflexion / Essayistik"
    description: "Figur denkt, Autor bleibt unsichtbar"
    llm_prompt_hint: >
      Analysiere: Essayistische Passagen, Figur denkt, Autor bleibt unsichtbar.
      Beachte: Grenze zwischen Figuren-Reflexion und Autorenkommentar.
    sort_order: 60
    is_active: true

- model: authors.situationtype
  pk: 207
  fields:
    genre_profile: 2
    slug: leitmotif
    label: Leitmotiv-Szene
    description: "Wiederkehrendes Bild, neue Bedeutungsebene"
    llm_prompt_hint: >
      Analysiere: Wiederkehrendes Bild/Motiv, Bedeutungsverschiebung bei Wiederholung.
      Beachte: Subtilitaet, kein plumpes Symbol.
    sort_order: 70
    is_active: true

- model: authors.situationtype
  pk: 208
  fields:
    genre_profile: 2
    slug: ending
    label: "Schluss / Offenes Ende"
    description: "Aufloesung verweigern oder verdichten"
    llm_prompt_hint: >
      Analysiere: Offenheit vs. Verdichtung, Resonanz, Nachklang.
      Beachte: Kein erklaerter Schluss, kein Moral-Appendix.
    sort_order: 80
    is_active: true


# ============================================================
# Situationstypen — Genre 3: Wissenschaftlich
# ============================================================
- model: authors.situationtype
  pk: 301
  fields:
    genre_profile: 3
    slug: abstract
    label: Abstract
    description: "Strukturierte Kurzzusammenfassung"
    llm_prompt_hint: >
      Analysiere: Vollstaendigkeit der 5 Abstract-Bausteine (Kontext, Forschungsluecke,
      Fragestellung, Methodik, Ergebnis/Beitrag), Praegnanz (150-250 Woerter),
      keine Zitate, kein Ich-Stil.
    sort_order: 10
    is_active: true

- model: authors.situationtype
  pk: 302
  fields:
    genre_profile: 3
    slug: introduction
    label: "Einleitung / Problemstellung"
    description: "Relevanz, Forschungsluecke, Fragestellung"
    llm_prompt_hint: >
      Analysiere: Relevanz-Argumentation, Forschungsluecke, klare Fragestellung.
      Beachte: Trichter-Struktur, vom Allgemeinen zum Spezifischen.
    sort_order: 20
    is_active: true

- model: authors.situationtype
  pk: 303
  fields:
    genre_profile: 3
    slug: argumentation
    label: Argumentationskette
    description: "These, Beleg, Schluss — keine Spruenge"
    llm_prompt_hint: >
      Analysiere: These-Beleg-Schluss-Struktur, logische Kohaerenz, Uebergaenge.
      Beachte: Keine Gedankenspruenge, keine unbelegten Behauptungen.
    sort_order: 30
    is_active: true

- model: authors.situationtype
  pk: 304
  fields:
    genre_profile: 3
    slug: methodology
    label: Methodik-Beschreibung
    description: "Praezision, Reproduzierbarkeit, Neutralitaet"
    llm_prompt_hint: >
      Analysiere: Praezision, Reproduzierbarkeit, Neutralitaet der Darstellung.
      Beachte: Passiv vs. Aktiv, Fachterminologie korrekt verwendet.
    sort_order: 40
    is_active: true

- model: authors.situationtype
  pk: 305
  fields:
    genre_profile: 3
    slug: results
    label: Ergebnisdarstellung
    description: "Datennah, kein Wertungsueberschuss"
    llm_prompt_hint: >
      Analysiere: Datennaehe, klare Struktur, Trennung von Ergebnis und Interpretation.
      Beachte: Kein vorweggenommenes Fazit, keine Wertung.
    sort_order: 50
    is_active: true

- model: authors.situationtype
  pk: 306
  fields:
    genre_profile: 3
    slug: discussion
    label: "Diskussion / Einordnung"
    description: "Kritische Reflexion, Grenzen benennen"
    llm_prompt_hint: >
      Analysiere: Kritische Reflexion, Einordnung in Forschungsstand, Grenzen benennen.
      Beachte: Keine Ueberinterpretation, ehrliche Limitationen.
    sort_order: 60
    is_active: true

- model: authors.situationtype
  pk: 307
  fields:
    genre_profile: 3
    slug: conclusion
    label: "Fazit / Ausblick"
    description: "Verdichtung und offene Fragen"
    llm_prompt_hint: >
      Analysiere: Verdichtung der Ergebnisse, offene Fragen, Forschungsausblick.
      Beachte: Kein Neustart, kein neues Argument im Fazit.
    sort_order: 70
    is_active: true

- model: authors.situationtype
  pk: 308
  fields:
    genre_profile: 3
    slug: citation
    label: "Zitation & Quellenintegration"
    description: "Nahtlos in Fliesstext, kein Zitatfriedhof"
    llm_prompt_hint: >
      Analysiere: Nahtlose Quellenintegration, Paraphrase vs. Direktzitat,
      Zitat als Argument nicht als Lueckenfueller. Beachte: Zitierstil-Konsistenz.
    sort_order: 80
    is_active: true


# ============================================================
# Situationstypen — Genre 4: Journalistisch

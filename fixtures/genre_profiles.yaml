    sort_order: 30
    is_active: true

- model: authors.situationtype
  pk: 404
  fields:
    genre_profile: 4
    slug: scene-setting
    label: Szenischer Einstieg
    description: "Reportage-Erzaehlung, konkrete Person/Moment"
    llm_prompt_hint: >
      Analysiere: Konkreter Moment, konkrete Person, sinnliche Details.
      Beachte: Reportage-Ton, nicht Roman-Ton. Fakten bleiben Fakten.
    sort_order: 40
    is_active: true

- model: authors.situationtype
  pk: 405
  fields:
    genre_profile: 4
    slug: data-narrative
    label: Daten erzaehlen
    description: "Zahlen mit Bedeutung, kein Tabellen-Dump"
    llm_prompt_hint: >
      Analysiere: Daten mit Kontext und Vergleich, menschliche Dimension der Zahlen.
      Beachte: Kein Tabellen-Dump, Zahlen muessen Geschichte erzaehlen.
    sort_order: 50
    is_active: true

- model: authors.situationtype
  pk: 406
  fields:
    genre_profile: 4
    slug: background
    label: "Hintergrund / Einordnung"
    description: "Geschichte ohne Abschweifung"
    llm_prompt_hint: >
      Analysiere: Relevante Hintergrundinformation, chronologische Klarheit.
      Beachte: Nur was zum Verstaendnis noetig ist, keine Geschichtsstunde.
    sort_order: 60
    is_active: true

- model: authors.situationtype
  pk: 407
  fields:
    genre_profile: 4
    slug: conflict-balance
    label: "Konflikt & Gegenperspektive"
    description: "Fairness ohne falsche Aequivalenz"
    llm_prompt_hint: >
      Analysiere: Faire Darstellung verschiedener Positionen, keine falsche Aequivalenz.
      Beachte: Journalistische Balance heisst nicht: beiden Seiten gleich viel Raum.
    sort_order: 70
    is_active: true

- model: authors.situationtype
  pk: 408
  fields:
    genre_profile: 4
    slug: closing
    label: "Schluss / Kicker"
    description: "Offene Frage oder starkes letztes Bild"
    llm_prompt_hint: >
      Analysiere: Kicker-Qualitaet, letztes Bild/Zitat, offene Frage.
      Beachte: Schluss darf nicht zusammenfassen, sondern resonieren.
    sort_order: 80
    is_active: true



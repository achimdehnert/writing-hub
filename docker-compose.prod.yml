services:
  writing_hub_web:
    image: ghcr.io/achimdehnert/writing-hub:${IMAGE_TAG:-latest}
    container_name: writing_hub_web
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - writing_hub_media:/app/media
      - writing_hub_static:/app/staticfiles
    depends_on:
      writing_hub_db:
        condition: service_healthy
      writing_hub_redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8097:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/livez/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - writing_hub_net

  writing_hub_db:
    image: postgres:15-alpine
    container_name: writing_hub_db
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "log_min_duration_statement=200"
    env_file:
      - .env.prod
    volumes:
      - writing_hub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 128m
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - writing_hub_net

  writing_hub_redis:
    image: redis:7-alpine
    container_name: writing_hub_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - writing_hub_net

  writing_hub_worker:
    image: ghcr.io/achimdehnert/writing-hub:${IMAGE_TAG:-latest}
    container_name: writing_hub_worker
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=2
    env_file:
      - .env.prod
    volumes:
      - writing_hub_media:/app/media
    depends_on:
      writing_hub_db:
        condition: service_healthy
      writing_hub_redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - writing_hub_net

  writing_hub_beat:
    image: ghcr.io/achimdehnert/writing-hub:${IMAGE_TAG:-latest}
    container_name: writing_hub_beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.prod
    depends_on:
      writing_hub_db:
        condition: service_healthy
      writing_hub_redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - writing_hub_net

  writing_hub_migrate:
    image: ghcr.io/achimdehnert/writing-hub:${IMAGE_TAG:-latest}
    container_name: writing_hub_migrate
    restart: "no"
    command: python manage.py migrate --noinput
    env_file:
      - .env.prod
    depends_on:
      writing_hub_db:
        condition: service_healthy
    networks:
      - writing_hub_net

volumes:
  writing_hub_pgdata:
  writing_hub_media:
  writing_hub_static:

networks:
  writing_hub_net:
    driver: bridge
